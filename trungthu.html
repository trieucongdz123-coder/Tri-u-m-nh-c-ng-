<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trung Thu Tuyên Quang</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0b1a3a;
    color: white;
}

/* Navbar */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: #ffcc00;
    margin: 0 20px;
    text-decoration: none;
    font-weight: bold;
}

/* Hero */
.hero {
    height: 100vh;
    background: url("img1.jpg") no-repeat center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    font-size: 50px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 15px;
}

/* Section */
section {
    padding: 80px 20px;
    text-align: center;
}

/* Slider */
.slider {
    width: 80%;
    margin: auto;
    overflow: hidden;
}

.slides {
    display: flex;
    animation: slide 15s infinite;
}

.slides img {
    width: 100%;
    border-radius: 15px;
}

@keyframes slide {
    0% {transform: translateX(0);}
    25% {transform: translateX(-100%);}
    50% {transform: translateX(-200%);}
    75% {transform: translateX(-300%);}
    100% {transform: translateX(0);}
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.gallery img {
    width: 300px;
    margin: 10px;
    border-radius: 15px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Footer */
footer {
    background: black;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<nav>
    <a href="#">Trang chủ</a>
    <a href="#hinhanh">Hình ảnh</a>
</nav>

<div class="hero">
    <h1>🎑 Trung Thu Tuyên Quang 🎑</h1>
</div>

<section id="hinhanh">
    <h2>📸 Hình ảnh nổi bật</h2>

    <!-- Slider -->
    <div class="slider">
        <div class="slides">
            <img src="img1.jpg">
            <img src="img2.jpg">
            <img src="img3.jpg">
            <img src="img4.jpg">
        </div>
    </div>

    <!-- Gallery -->
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
    </div>
</section>

<footer>
    <p>© 2026 Trung Thu Tuyên Quang</p>
</footer>

</body>
</html>
